<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oguzhan Dogru | Digital Business Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="photo-wrap">
      <img src="photo.jpg" alt="Oguzhan Dogru" class="photo">
    </div>
    <div class="content">
      <h1>Oguzhan Dogru</h1>
      <p class="tagline">Turning Process Control into Business Value</p>
      <div class="tags">
        <span class="tag">PhD, University of Alberta</span>
        <span class="tag">PEng</span>
      </div>
      <div class="location">
        <span>Calgary, AB</span>
      </div>

      <div class="links">
        <a href="https://www.linkedin.com/in/oguzhandogru/" target="_blank" class="link-row">
          <span class="icon">in</span>
          <span>Connect with me on LinkedIn</span>
        </a>
      </div>

      <button id="saveBtn" class="save-btn">Save Contact</button>
      <p class="hint" id="hint"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
